<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל תשבצים מקצועי</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body, input, button, textarea {
      font-family: 'Varela Round', sans-serif;
    }

    @media print {
      @page {
        size: A4 landscape;
        margin: 0mm; 
      }
      body {
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        overflow: hidden !important; 
      }
      .print-hidden { display: none !important; }
      
      .printable-wrapper {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 297mm !important;
        height: 209.5mm !important; 
        margin: 0 !important;
        padding: 12mm !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        overflow: hidden !important; 
      }

      input::placeholder {
        color: transparent !important;
      }
      
      li {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
    
    .print-hidden-scroll::-webkit-scrollbar {
        display: none;
    }
    .print-hidden-scroll {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-gray-100">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    function App() {
      const [rows, setRows] = useState(12);
      const [cols, setCols] = useState(12);
      const [grid, setGrid] = useState([]);
      const [mode, setMode] = useState('block'); 
      const [bgImage, setBgImage] = useState(null);
      
      // רשימות נפרדות למאוזן ומאונך
      const [cluesAcross, setCluesAcross] = useState([]);
      const [cluesDown, setCluesDown] = useState([]);

      // מצב חלונית המספור כולל כיוונים
      const [modalState, setModalState] = useState({ isOpen: false, r: null, c: null, value: '', isAcross: false, isDown: false });
      
      const [title, setTitle] = useState('התשבץ שלי');
      const [subtitle, setSubtitle] = useState('כתבו כאן את כותרת המשנה או הוראות לפותרים...');

      const [selectedFont, setSelectedFont] = useState("'Varela Round', sans-serif");
      const fontOptions = [
        { label: 'Varela Round (ברירת מחדל)', value: "'Varela Round', sans-serif" },
        { label: 'Arial', value: "Arial, Helvetica, sans-serif" },
        { label: 'David', value: "'David', serif" },
        { label: 'Frank Ruhl', value: "'Frank Ruhl Libre', serif" },
        { label: 'Tahoma', value: "Tahoma, Geneva, sans-serif" },
        { label: 'Courier New', value: "'Courier New', Courier, monospace" },
        { label: 'גופן מערכת', value: "system-ui, -apple-system, sans-serif" }
      ];

      // חישוב גודל הרשת דינמית
      const MAX_GRID_WIDTH = 480; 
      const MAX_GRID_HEIGHT = 480; 
      const calculatedCellSize = Math.min(MAX_GRID_WIDTH / cols, MAX_GRID_HEIGHT / rows);
      const cellSize = Math.min(calculatedCellSize, 45); 

      useEffect(() => {
        setGrid((prevGrid) => {
          const newGrid = Array(rows).fill(null).map((_, r) =>
            Array(cols).fill(null).map((_, c) => {
              if (prevGrid[r] && prevGrid[r][c]) {
                return { ...prevGrid[r][c] };
              }
              return { isBlocked: false, number: null, value: '', isHighlighted: false };
            })
          );
          return newGrid;
        });
      }, [rows, cols]);

      // מספור אוטומטי - מחפש אך ורק מילים מאוזנות
      const calculateNumbersAcross = useCallback(() => {
        if (!window.confirm('פעולה זו תחשב מחדש את המספור האוטומטי (למילים מאוזנות בלבד) ותאפס מספור קיים. להמשיך?')) return;
        
        let num = 1;
        const newGrid = grid.map(row => row.map(cell => ({ ...cell, number: null })));
        const newCluesAcross = [];

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (newGrid[r][c].isBlocked) continue;

            // בדיקה האם זו תחילת מילה מאוזנת (ימין חסום/קצה ושמאל פתוח)
            const isRightBlocked = c === 0 || newGrid[r][c - 1].isBlocked;
            const isLeftOpen = c < cols - 1 && !newGrid[r][c + 1].isBlocked;
            const needsNumber = isRightBlocked && isLeftOpen;

            if (needsNumber) {
              newGrid[r][c].number = num;
              newCluesAcross.push({ num, text: '' });
              num++;
            }
          }
        }

        const preserveText = (newArr, oldArr) => {
          return newArr.map(nc => {
            const existing = oldArr.find(oc => oc.num === nc.num);
            return existing ? { ...nc, text: existing.text } : nc;
          });
        };

        setCluesAcross(prev => preserveText(newCluesAcross, prev));
        setCluesDown([]); // איפוס מאונכים כי הרשת חושבה מחדש
        setGrid(newGrid);
      }, [grid, rows, cols]);

      const handleCellClick = (r, c) => {
        if (mode === 'number') {
          const cell = grid[r][c];
          if (!cell.isBlocked) {
            let proposedVal = cell.number || '';
            let isAc = false;
            let isDw = false;
            
            if (proposedVal) {
              isAc = cluesAcross.some(cl => cl.num === proposedVal);
              isDw = cluesDown.some(cl => cl.num === proposedVal);
            } else {
              // הצעת המספר הבא הפנוי
              let max = 0;
              cluesAcross.forEach(cl => { if (cl.num > max) max = cl.num; });
              cluesDown.forEach(cl => { if (cl.num > max) max = cl.num; });
              proposedVal = max + 1;
              isDw = true; // ברירת מחדל למספור ידני - מאונך (כי מאוזן לרוב אוטומטי)
            }
            
            setModalState({ isOpen: true, r, c, value: proposedVal, isAcross: isAc, isDown: isDw });
          }
          return;
        }

        const newGrid = grid.map(row => row.map(cell => ({ ...cell })));
        const cell = newGrid[r][c];

        if (mode === 'block') {
          cell.isBlocked = !cell.isBlocked;
          if (cell.isBlocked) {
            cell.value = '';
            cell.isHighlighted = false;
            
            // מחיקת ההגדרה אם חסמנו משבצת שהיה בה מספר
            if (cell.number) {
                setCluesAcross(prev => prev.filter(cl => cl.num !== cell.number));
                setCluesDown(prev => prev.filter(cl => cl.num !== cell.number));
            }
            cell.number = null;
          }
        } else if (mode === 'highlight') {
          if (!cell.isBlocked) cell.isHighlighted = !cell.isHighlighted;
        }
        setGrid(newGrid);
      };

      const handleCellChange = (r, c, val) => {
        if (mode !== 'text') return;
        const newGrid = grid.map(row => row.map(cell => ({ ...cell })));
        newGrid[r][c].value = val.slice(-1);
        setGrid(newGrid);
      };

      const handleClueChange = (num, direction, text) => {
        if (direction === 'across') {
          setCluesAcross(prev => prev.map(c => c.num === num ? { ...c, text } : c));
        } else {
          setCluesDown(prev => prev.map(c => c.num === num ? { ...c, text } : c));
        }
      };

      const clearGrid = () => {
        if (window.confirm('האם אתה בטוח שברצונך לנקות את כל התשבץ?')) {
          const newGrid = Array(rows).fill(null).map(() =>
            Array(cols).fill(null).map(() => ({
              isBlocked: false, number: null, value: '', isHighlighted: false
            }))
          );
          setGrid(newGrid);
          setCluesAcross([]);
          setCluesDown([]);
        }
      };

      // שמירת מספור ידני לתוך הרשימות הנכונות
      const handleSaveManualNumber = (e) => {
        e.preventDefault();
        const { r, c, value, isAcross, isDown } = modalState;
        
        const numVal = (value === '' || isNaN(value)) ? null : Number(value);
        const oldNumVal = grid[r][c].number;

        const newGrid = grid.map(row => row.map(cell => ({ ...cell })));
        newGrid[r][c].number = numVal;
        setGrid(newGrid);

        // עדכון רשימה מאוזנת
        setCluesAcross(prev => {
          let next = [...prev];
          if (oldNumVal !== null && oldNumVal !== numVal) {
               next = next.filter(cl => cl.num !== oldNumVal);
          }
          if (numVal !== null) {
              if (isAcross) {
                  if (!next.find(cl => cl.num === numVal)) next.push({ num: numVal, text: '' });
              } else {
                  next = next.filter(cl => cl.num !== numVal);
              }
          }
          return next.sort((a,b) => a.num - b.num);
        });

        // עדכון רשימה מאונכת
        setCluesDown(prev => {
          let next = [...prev];
          if (oldNumVal !== null && oldNumVal !== numVal) {
               next = next.filter(cl => cl.num !== oldNumVal);
          }
          if (numVal !== null) {
              if (isDown) {
                  if (!next.find(cl => cl.num === numVal)) next.push({ num: numVal, text: '' });
              } else {
                  next = next.filter(cl => cl.num !== numVal);
              }
          }
          return next.sort((a,b) => a.num - b.num);
        });

        setModalState({ isOpen: false, r: null, c: null, value: '', isAcross: false, isDown: false });
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => setBgImage(event.target.result);
          reader.readAsDataURL(file);
        }
      };

      return (
        <div dir="rtl" className="min-h-screen text-gray-800 p-4 md:p-8">
          
          <div className="print-hidden mb-8 bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h1 className="text-2xl font-bold mb-6 text-indigo-900">מחולל תשבצים מקצועי (כולל מאוזן ומאונך)</h1>
            
            <div className="flex flex-wrap gap-6 items-end">
              
              <div className="flex gap-4">
                <div>
                  <label className="block text-sm font-bold mb-1">שורות</label>
                  <input type="number" min="5" max="35" value={rows} onChange={e => setRows(Number(e.target.value))} 
                         className="w-16 p-2 border rounded text-center" />
                </div>
                <div>
                  <label className="block text-sm font-bold mb-1">עמודות</label>
                  <input type="number" min="5" max="35" value={cols} onChange={e => setCols(Number(e.target.value))} 
                         className="w-16 p-2 border rounded text-center" />
                </div>
              </div>

              <div className="h-10 border-r border-gray-300 mx-1"></div>

              <div>
                <label className="block text-sm font-bold mb-1">כלי עריכה</label>
                <div className="flex bg-gray-100 rounded-lg p-1">
                  <button onClick={() => setMode('block')} className={`flex items-center gap-2 px-3 py-2 rounded-md transition-colors ${mode === 'block' ? 'bg-white shadow text-indigo-700' : 'hover:bg-gray-200'}`}>
                    <i className="fas fa-square"></i> חסימה
                  </button>
                  <button onClick={() => setMode('text')} className={`flex items-center gap-2 px-3 py-2 rounded-md transition-colors ${mode === 'text' ? 'bg-white shadow text-indigo-700' : 'hover:bg-gray-200'}`}>
                    <i className="fas fa-font"></i> טקסט
                  </button>
                  <button onClick={() => setMode('highlight')} className={`flex items-center gap-2 px-3 py-2 rounded-md transition-colors ${mode === 'highlight' ? 'bg-white shadow text-indigo-700' : 'hover:bg-gray-200'}`}>
                    <i className="fas fa-highlighter"></i> הדגשה
                  </button>
                  <button onClick={() => setMode('number')} className={`flex items-center gap-2 px-3 py-2 rounded-md transition-colors ${mode === 'number' ? 'bg-white shadow text-indigo-700' : 'hover:bg-gray-200'}`}>
                    <i className="fas fa-hashtag"></i> מספור ידני
                  </button>
                </div>
              </div>

              <div className="h-10 border-r border-gray-300 mx-1"></div>

              <div>
                <label className="block text-sm font-bold mb-1">תמונת רקע</label>
                <div className="flex items-center gap-2">
                  <label className="cursor-pointer flex items-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-lg font-bold transition-colors text-sm">
                    <i className="fas fa-image"></i>
                    {bgImage ? 'החלף רקע' : 'בחר רקע'}
                    <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                  </label>
                  {bgImage && (
                    <button onClick={() => setBgImage(null)} title="הסר רקע" className="text-red-500 hover:bg-red-50 p-2 rounded-md">
                       <i className="fas fa-times"></i>
                    </button>
                  )}
                </div>
              </div>

              <div className="h-10 border-r border-gray-300 mx-1"></div>

              <div>
                <label className="block text-sm font-bold mb-1">גופן לתשבץ</label>
                <select 
                  value={selectedFont} 
                  onChange={(e) => setSelectedFont(e.target.value)}
                  className="bg-gray-100 text-gray-700 px-3 py-2 rounded-lg font-bold transition-colors text-sm border-none outline-none focus:ring-2 focus:ring-indigo-100 cursor-pointer"
                >
                  {fontOptions.map(font => (
                    <option key={font.value} value={font.value}>{font.label}</option>
                  ))}
                </select>
              </div>

            </div>

            <div className="flex gap-3 mt-6 border-t pt-4">
              <button onClick={calculateNumbersAcross} className="flex items-center gap-2 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-4 py-2 rounded-lg font-bold transition-colors">
                <i className="fas fa-calculator"></i> מספור אוטומטי (למאוזן בלבד)
              </button>
              <button onClick={clearGrid} className="flex items-center gap-2 bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg font-bold transition-colors">
                <i className="fas fa-eraser"></i> נקה הכל
              </button>
              <button onClick={() => window.print()} className="flex items-center gap-2 bg-indigo-600 text-white hover:bg-indigo-700 px-6 py-2 rounded-lg font-bold transition-colors shadow-sm ml-auto">
                <i className="fas fa-print"></i> הדפס ל-A4
              </button>
            </div>
          </div>

          <div className="flex justify-center w-full overflow-x-auto pb-10 print-hidden-scroll">
            <div 
              className="printable-wrapper relative bg-white shadow-xl rounded-xl overflow-hidden flex flex-col"
              style={{ width: '100%', maxWidth: '1123px', aspectRatio: '297 / 210', padding: '24px' }}
            >
              {bgImage && (
                <img src={bgImage} alt="Background" className="absolute inset-0 w-full h-full object-cover opacity-60 z-0 pointer-events-none" />
              )}

              <div className="relative z-10 w-full text-center mb-6 flex flex-col items-center">
                <input 
                  type="text" value={title} onChange={(e) => setTitle(e.target.value)}
                  placeholder="הקלידו כותרת לתשבץ..."
                  className="text-4xl font-bold bg-transparent border-none outline-none text-center text-gray-900 w-full max-w-3xl focus:ring-2 focus:ring-indigo-100 rounded-md print:text-black mb-1 hover:bg-gray-50 print:hover:bg-transparent transition-colors"
                  style={{ fontFamily: selectedFont }}
                />
                <input 
                  type="text" value={subtitle} onChange={(e) => setSubtitle(e.target.value)}
                  placeholder="הקלידו כותרת משנה..."
                  className="text-xl bg-transparent border-none outline-none text-center text-gray-600 w-full max-w-2xl focus:ring-2 focus:ring-indigo-100 rounded-md print:text-gray-800 hover:bg-gray-50 print:hover:bg-transparent transition-colors"
                  style={{ fontFamily: selectedFont }}
                />
              </div>

              {/* תוכן: רשת + שתי עמודות של הגדרות */}
              <div className="relative z-10 flex flex-row gap-5 w-full flex-1 min-h-0 overflow-hidden">
                
                {/* רשת התשבץ */}
                <div className="flex-shrink-0 flex items-start justify-center">
                  <div className="bg-white/90 p-3 rounded-xl shadow-sm border border-gray-200 inline-block">
                    <div className="inline-grid border-2 border-black" style={{ gridTemplateColumns: `repeat(${cols}, minmax(0, 1fr))` }}>
                      {grid.map((row, r) => (
                        row.map((cell, c) => (
                          <div 
                            key={`${r}-${c}`} onClick={() => handleCellClick(r, c)}
                            className={`relative border border-black flex items-center justify-center select-none ${cell.isBlocked ? 'bg-black' : 'bg-white'} ${cell.isHighlighted && !cell.isBlocked ? 'bg-gray-300' : ''} ${mode !== 'text' ? 'cursor-pointer hover:opacity-80' : ''}`}
                            style={{ width: `${cellSize}px`, height: `${cellSize}px` }}
                          >
                            {!cell.isBlocked && cell.number && (
                              <span className="absolute top-0.5 right-1 font-bold leading-none text-black pointer-events-none z-10 font-sans" style={{ fontSize: `${Math.max(cellSize * 0.28, 9)}px` }}>
                                {cell.number}
                              </span>
                            )}
                            {!cell.isBlocked && (
                              <input
                                type="text" value={cell.value} onChange={(e) => handleCellChange(r, c, e.target.value)} readOnly={mode !== 'text'}
                                className={`w-full h-full text-center font-bold uppercase bg-transparent outline-none ${mode === 'text' ? 'cursor-text' : 'cursor-pointer'}`}
                                style={{ pointerEvents: mode === 'text' ? 'auto' : 'none', fontFamily: selectedFont, fontSize: `${Math.max(cellSize * 0.55, 12)}px` }}
                              />
                            )}
                          </div>
                        ))
                      ))}
                    </div>
                  </div>
                </div>

                {/* הגדרות - מאוזן */}
                <div className="flex-1 flex flex-col h-full bg-white/90 p-4 rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <h2 className="text-lg font-bold mb-3 border-b-2 border-black pb-1" style={{ fontFamily: selectedFont }}>מאוזן:</h2>
                  <div className="flex-1 overflow-y-auto pr-2">
                    {cluesAcross.length === 0 ? (
                      <p className="text-gray-500 text-sm print-hidden" style={{ fontFamily: selectedFont }}>לחצו על מספור אוטומטי או הוסיפו ידנית.</p>
                    ) : (
                      <div style={{ fontFamily: selectedFont }}>
                        {cluesAcross.map(clue => (
                          <div key={`clue-ac-${clue.num}`} className="flex items-start gap-2 mb-2 break-inside-avoid" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                            <span className="font-bold min-w-[20px] text-left mt-1">{clue.num}.</span>
                            <input 
                              type="text" value={clue.text} onChange={(e) => handleClueChange(clue.num, 'across', e.target.value)} placeholder="הגדרה..."
                              className="flex-1 bg-transparent border-b border-gray-300 hover:border-gray-500 focus:border-indigo-500 outline-none print:border-none print:placeholder-transparent resize-none text-base py-1 transition-colors w-full"
                              style={{ fontFamily: selectedFont }}
                            />
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

                {/* הגדרות - מאונך */}
                <div className="flex-1 flex flex-col h-full bg-white/90 p-4 rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                  <h2 className="text-lg font-bold mb-3 border-b-2 border-black pb-1" style={{ fontFamily: selectedFont }}>מאונך:</h2>
                  <div className="flex-1 overflow-y-auto pr-2">
                    {cluesDown.length === 0 ? (
                      <p className="text-gray-500 text-sm print-hidden" style={{ fontFamily: selectedFont }}>השתמשו בכלי המספור כדי להוסיף הגדרות מאונכות.</p>
                    ) : (
                      <div style={{ fontFamily: selectedFont }}>
                        {cluesDown.map(clue => (
                          <div key={`clue-dw-${clue.num}`} className="flex items-start gap-2 mb-2 break-inside-avoid" style={{ pageBreakInside: 'avoid', breakInside: 'avoid' }}>
                            <span className="font-bold min-w-[20px] text-left mt-1">{clue.num}.</span>
                            <input 
                              type="text" value={clue.text} onChange={(e) => handleClueChange(clue.num, 'down', e.target.value)} placeholder="הגדרה..."
                              className="flex-1 bg-transparent border-b border-gray-300 hover:border-gray-500 focus:border-indigo-500 outline-none print:border-none print:placeholder-transparent resize-none text-base py-1 transition-colors w-full"
                              style={{ fontFamily: selectedFont }}
                            />
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>

              </div>
            </div>
          </div>

          {/* חלונית למספור ידני ושיוך כיוונים */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 print-hidden">
              <form onSubmit={handleSaveManualNumber} className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm" dir="rtl">
                <div className="flex justify-between items-center mb-4 border-b pb-3">
                  <h3 className="text-lg font-bold text-indigo-900">הגדרת מספר ותפקיד לתא</h3>
                  <button type="button" onClick={() => setModalState({ isOpen: false, r: null, c: null, value: '', isAcross: false, isDown: false })} className="text-gray-500 hover:bg-gray-100 p-1 rounded-md transition-colors">
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                
                <div className="mb-4">
                  <label className="block text-sm font-bold mb-2 text-gray-700">מספר תא (השאר ריק למחיקה):</label>
                  <input 
                    autoFocus type="number" min="1" value={modalState.value} 
                    onChange={(e) => setModalState({...modalState, value: e.target.value})}
                    className="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg" 
                  />
                </div>

                <div className="mb-6 p-3 bg-gray-50 rounded-lg border border-gray-200">
                  <p className="text-sm font-bold text-gray-700 mb-2">לאן לשייך מספר זה?</p>
                  <label className="flex items-center gap-3 mb-2 cursor-pointer">
                    <input type="checkbox" checked={modalState.isAcross} onChange={(e) => setModalState({...modalState, isAcross: e.target.checked})} className="w-5 h-5 text-indigo-600 rounded" />
                    <span className="text-gray-800">הוסף לרשימת "מאוזן"</span>
                  </label>
                  <label className="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" checked={modalState.isDown} onChange={(e) => setModalState({...modalState, isDown: e.target.checked})} className="w-5 h-5 text-indigo-600 rounded" />
                    <span className="text-gray-800">הוסף לרשימת "מאונך"</span>
                  </label>
                </div>

                <div className="flex gap-3 justify-end">
                  <button type="button" onClick={() => setModalState({...modalState, value: '', isAcross: false, isDown: false})} className="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg font-bold transition-colors">
                    נקה מספר
                  </button>
                  <button type="submit" className="px-5 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg font-bold transition-colors shadow-sm">
                    שמור תא
                  </button>
                </div>
              </form>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
