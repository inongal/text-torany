<!DOCTYPE html>
<html lang="he" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טקסט תורני</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for the transcription box */
        #result-text::-webkit-scrollbar { width: 8px; }
        #result-text::-webkit-scrollbar-track { background: transparent; }
        #result-text::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark #result-text::-webkit-scrollbar-thumb { background: #475569; }
        #result-text::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
        .dark .glass-panel {
            background: rgba(30, 41, 59, 0.9);
        }
        
        /* Settings Drawer Transitions */
        #settings-drawer {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-open { transform: translateX(0); }
        .drawer-closed { transform: translateX(100%); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300 min-h-screen flex flex-col items-center justify-center p-4 text-slate-800 dark:text-slate-100 relative overflow-x-hidden">

    <!-- Top Navigation / Settings Toggle -->
    <div class="fixed top-4 right-4 z-40">
        <button id="settings-toggle-btn" class="p-3 bg-white dark:bg-slate-800 rounded-full shadow-lg text-slate-600 dark:text-slate-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-500">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- Settings Drawer -->
    <div id="settings-overlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden transition-opacity opacity-0"></div>
    <div id="settings-drawer" class="fixed top-0 right-0 h-full w-80 max-w-[85vw] glass-panel shadow-2xl z-50 p-6 flex flex-col drawer-closed border-l border-slate-200 dark:border-slate-700">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold dark:text-white">הגדרות מערכת</h2>
            <button id="close-settings-btn" class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Theme Toggle -->
        <div class="mb-8">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-3">עיצוב</label>
            <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                <button id="theme-light-btn" class="flex-1 flex justify-center items-center gap-2 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm dark:bg-transparent dark:shadow-none dark:text-slate-400">
                    <i data-lucide="sun" class="w-4 h-4"></i>
                    בהיר
                </button>
                <button id="theme-dark-btn" class="flex-1 flex justify-center items-center gap-2 py-2 rounded-lg text-sm font-medium transition-all bg-transparent text-slate-500 dark:bg-slate-700 dark:text-white dark:shadow-sm">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                    כהה
                </button>
            </div>
        </div>

        <!-- API Key Settings -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">מפתח API של ג'מיני</label>
            <p class="text-xs text-slate-500 dark:text-slate-400 mb-3 leading-relaxed">המפתח נשמר בצורה מאובטחת בדפדפן שלך בלבד ונדרש לצורך פעולת התמלול.</p>
            <div class="flex flex-col gap-2">
                <input type="password" id="api-key-input" placeholder="הדביקו מפתח כאן..." class="w-full px-3 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 text-sm dark:text-white" dir="ltr">
                <button id="save-key-btn" class="w-full bg-slate-800 dark:bg-primary-600 hover:bg-slate-900 dark:hover:bg-primary-700 text-white px-4 py-2.5 rounded-lg text-sm font-medium transition-colors">שמור הגדרות</button>
            </div>
            <p id="key-status" class="text-xs text-center mt-3 hidden"></p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-3xl w-full bg-white dark:bg-slate-800 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 p-8 md:p-10 transition-colors duration-300 mt-12 md:mt-0">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-primary-50 dark:bg-primary-900/30 text-primary-600 dark:text-primary-400 mb-5 shadow-sm">
                <i data-lucide="mic" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white mb-3 tracking-tight">טקסט תורני</h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg">מערכת לתמלול שיעורי תורה</p>
        </div>

        <!-- File Upload Area -->
        <div id="drop-zone" class="border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-2xl p-10 text-center hover:border-primary-500 dark:hover:border-primary-400 hover:bg-primary-50/50 dark:hover:bg-slate-700/50 transition-all cursor-pointer mb-6 group">
            <input type="file" id="audio-file" accept="audio/*" class="hidden">
            <div class="w-16 h-16 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-400 dark:text-slate-300"></i>
            </div>
            <h3 class="text-xl font-semibold text-slate-700 dark:text-slate-200 mb-2">לחצו לבחירת קובץ שמע</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400">תומך ב- MP3, WAV, M4A (עד 15MB)</p>
            <div id="file-name" class="mt-4 text-primary-600 dark:text-primary-400 font-medium hidden text-sm break-all bg-primary-50 dark:bg-primary-900/20 py-2 px-4 rounded-lg inline-block"></div>
        </div>

        <!-- Message Box -->
        <div id="message-box" class="hidden rounded-xl p-4 mb-6 text-sm font-medium border"></div>

        <!-- Progress Area -->
        <div id="progress-area" class="hidden mb-6">
            <div class="flex justify-between text-sm font-medium text-slate-600 dark:text-slate-300 mb-2">
                <span id="progress-status-text">מתכונן לתמלול...</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-3 overflow-hidden">
                <div id="progress-bar" class="bg-primary-600 h-3 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
            </div>
        </div>

        <!-- Actions -->
        <button id="transcribe-btn" disabled class="w-full bg-primary-600 hover:bg-primary-700 dark:bg-primary-600 dark:hover:bg-primary-500 disabled:bg-slate-200 dark:disabled:bg-slate-700 disabled:text-slate-400 dark:disabled:text-slate-500 disabled:cursor-not-allowed text-white font-semibold py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-3 shadow-md disabled:shadow-none hover:shadow-lg">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
            <span class="text-lg">התחל תמלול עכשיו</span>
            <div id="loading-spinner" class="hidden w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
        </button>

        <!-- Result Area -->
        <div id="result-area" class="hidden mt-10 opacity-0 transition-opacity duration-700">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-bold text-slate-800 dark:text-white flex items-center gap-2">
                    <i data-lucide="file-text" class="w-5 h-5 text-primary-500"></i>
                    תוצאת התמלול
                </h3>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-slate-400 font-medium hidden sm:inline-block">ניתן לערוך את הטקסט בחלונית</span>
                    <button id="copy-btn" class="text-slate-600 dark:text-slate-300 hover:text-primary-600 dark:hover:text-primary-400 bg-slate-100 hover:bg-primary-50 dark:bg-slate-700 dark:hover:bg-slate-600 py-2 px-4 rounded-xl transition-colors flex items-center gap-2 text-sm font-semibold shadow-sm">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                        <span>העתקה</span>
                    </button>
                </div>
            </div>
            <div id="result-text" contenteditable="true" class="w-full h-80 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl p-6 text-slate-700 dark:text-slate-200 leading-loose overflow-y-auto whitespace-pre-wrap outline-none focus:border-primary-400 focus:ring-4 focus:ring-primary-100 dark:focus:ring-primary-900/30 transition-all text-base md:text-lg"></div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Gemini API setup
        const apiKey = ""; 

        // DOM Elements
        const htmlElement = document.documentElement;
        const fileInput = document.getElementById('audio-file');
        const dropZone = document.getElementById('drop-zone');
        const fileNameDisplay = document.getElementById('file-name');
        const transcribeBtn = document.getElementById('transcribe-btn');
        const loadingSpinner = document.getElementById('loading-spinner');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        const messageBox = document.getElementById('message-box');
        const copyBtn = document.getElementById('copy-btn');
        const apiKeyInput = document.getElementById('api-key-input');
        const saveKeyBtn = document.getElementById('save-key-btn');
        const keyStatus = document.getElementById('key-status');
        
        // Progress UI
        const progressArea = document.getElementById('progress-area');
        const progressBar = document.getElementById('progress-bar');
        const progressStatusText = document.getElementById('progress-status-text');
        const progressPercentage = document.getElementById('progress-percentage');

        // Drawer UI
        const settingsToggleBtn = document.getElementById('settings-toggle-btn');
        const closeSettingsBtn = document.getElementById('close-settings-btn');
        const settingsDrawer = document.getElementById('settings-drawer');
        const settingsOverlay = document.getElementById('settings-overlay');
        const themeLightBtn = document.getElementById('theme-light-btn');
        const themeDarkBtn = document.getElementById('theme-dark-btn');

        let selectedFile = null;
        let progressInterval = null;
        const MAX_FILE_SIZE = 15 * 1024 * 1024; // 15MB

        // --- Theme Management ---
        function applyTheme(isDark) {
            if (isDark) {
                htmlElement.classList.add('dark');
                themeDarkBtn.classList.add('bg-slate-700', 'text-white', 'shadow-sm');
                themeDarkBtn.classList.remove('bg-transparent', 'text-slate-500');
                themeLightBtn.classList.remove('bg-white', 'shadow-sm', 'text-slate-900');
                themeLightBtn.classList.add('bg-transparent', 'text-slate-400');
            } else {
                htmlElement.classList.remove('dark');
                themeLightBtn.classList.add('bg-white', 'shadow-sm', 'text-slate-900');
                themeLightBtn.classList.remove('bg-transparent', 'text-slate-400');
                themeDarkBtn.classList.remove('bg-slate-700', 'text-white', 'shadow-sm');
                themeDarkBtn.classList.add('bg-transparent', 'text-slate-500');
            }
        }

        // Init theme
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyTheme(savedTheme === 'dark' || (!savedTheme && prefersDark));

        themeDarkBtn.addEventListener('click', () => {
            localStorage.setItem('theme', 'dark');
            applyTheme(true);
        });

        themeLightBtn.addEventListener('click', () => {
            localStorage.setItem('theme', 'light');
            applyTheme(false);
        });

        // --- Settings Drawer Logic ---
        function toggleDrawer(show) {
            if (show) {
                settingsOverlay.classList.remove('hidden');
                setTimeout(() => settingsOverlay.classList.replace('opacity-0', 'opacity-100'), 10);
                settingsDrawer.classList.replace('drawer-closed', 'drawer-open');
            } else {
                settingsOverlay.classList.replace('opacity-100', 'opacity-0');
                settingsDrawer.classList.replace('drawer-open', 'drawer-closed');
                setTimeout(() => settingsOverlay.classList.add('hidden'), 300);
            }
        }

        settingsToggleBtn.addEventListener('click', () => toggleDrawer(true));
        closeSettingsBtn.addEventListener('click', () => toggleDrawer(false));
        settingsOverlay.addEventListener('click', () => toggleDrawer(false));

        // --- API Key Logic ---
        let currentApiKey = localStorage.getItem('gemini_api_key') || "";
        if (currentApiKey) {
            apiKeyInput.value = currentApiKey;
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                currentApiKey = key;
                showKeyStatus("המפתח נשמר בהצלחה!", "success");
            } else {
                localStorage.removeItem('gemini_api_key');
                currentApiKey = "";
                showKeyStatus("המפתח הוסר", "error");
            }
            setTimeout(() => toggleDrawer(false), 1500);
        });

        function showKeyStatus(text, type) {
            keyStatus.textContent = text;
            keyStatus.className = `text-sm mt-3 font-medium ${type === 'success' ? 'text-green-500 dark:text-green-400' : 'text-red-500 dark:text-red-400'}`;
            keyStatus.classList.remove('hidden');
            setTimeout(() => keyStatus.classList.add('hidden'), 3000);
        }

        function getEffectiveApiKey() {
            return currentApiKey || apiKey;
        }

        // --- File Selection Logic ---
        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            hideMessage();
            resultArea.classList.add('hidden');
            resultArea.classList.remove('opacity-100');
            progressArea.classList.add('hidden');
            
            if (!file.type.startsWith('audio/')) {
                showMessage('אנא בחרו קובץ שמע תקין.', 'error');
                resetSelection();
                return;
            }

            if (file.size > MAX_FILE_SIZE) {
                showMessage('הקובץ גדול מדי. אנא העלו קובץ שמע עד 15MB.', 'error');
                resetSelection();
                return;
            }

            selectedFile = file;
            fileNameDisplay.innerHTML = `<i data-lucide="file-audio" class="w-4 h-4 inline-block ml-1"></i> נבחר קובץ: ${file.name}`;
            lucide.createIcons();
            fileNameDisplay.classList.remove('hidden');
            transcribeBtn.disabled = false;
        }

        function resetSelection() {
            selectedFile = null;
            fileInput.value = '';
            fileNameDisplay.textContent = '';
            fileNameDisplay.classList.add('hidden');
            transcribeBtn.disabled = true;
        }

        function showMessage(text, type = 'error') {
            messageBox.textContent = text;
            messageBox.className = `rounded-xl p-4 mb-6 text-sm font-medium border ${
                type === 'error' ? 'bg-red-50 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800' : 'bg-green-50 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-400 dark:border-green-800'
            }`;
            messageBox.classList.remove('hidden');
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const result = reader.result;
                    const base64 = result.split(',')[1];
                    const mimeType = file.type || 'audio/mp3';
                    resolve({ base64, mimeType });
                };
                reader.onerror = () => reject(new Error("שגיאה בקריאת הקובץ במכשיר שלך."));
                reader.readAsDataURL(file);
            });
        }

        async function fetchWithRetry(url, options) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`שגיאת שרת: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === delays.length) {
                        throw error;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // --- Progress Simulation ---
        function startProgress() {
            progressArea.classList.remove('hidden');
            let width = 0;
            progressBar.style.width = '0%';
            progressPercentage.textContent = '0%';
            progressStatusText.textContent = 'קורא קובץ...';

            progressInterval = setInterval(() => {
                if (width < 30) {
                    width += Math.random() * 5 + 2;
                    progressStatusText.textContent = 'מעבד ומתכונן לשליחה...';
                } else if (width < 60) {
                    width += Math.random() * 2 + 1;
                    progressStatusText.textContent = 'מעלה לשרתים של ג\'מיני...';
                } else if (width < 90) {
                    width += Math.random() * 1.5;
                    progressStatusText.textContent = 'מפענח את השמע (זה עשוי לקחת מעט זמן)...';
                }
                
                if (width > 95) width = 95;
                progressBar.style.width = width + '%';
                progressPercentage.textContent = Math.round(width) + '%';
            }, 800);
        }

        function completeProgress() {
            clearInterval(progressInterval);
            progressBar.style.width = '100%';
            progressPercentage.textContent = '100%';
            progressStatusText.textContent = 'התמלול הושלם בהצלחה!';
            setTimeout(() => {
                progressArea.classList.add('hidden');
            }, 2000);
        }

        function stopProgress() {
            clearInterval(progressInterval);
            progressArea.classList.add('hidden');
        }

        // --- Main Transcription Action ---
        transcribeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI Loading state
            transcribeBtn.disabled = true;
            loadingSpinner.classList.remove('hidden');
            transcribeBtn.querySelector('span').textContent = 'מבצע תמלול...';
            hideMessage();
            resultArea.classList.add('hidden');
            resultArea.classList.remove('opacity-100');
            
            startProgress();

            try {
                // Check API Key
                const effectiveKey = getEffectiveApiKey();
                if (!effectiveKey) {
                    throw new Error("יש להזין ולשמור מפתח API בהגדרות (סמל גלגל השיניים) כדי להתחיל.");
                }

                // בחירת מודל: מודל פנימי לסביבת התצוגה המקדימה, ומודל ציבורי (1.5-flash) כשהמשתמש מזין מפתח משלו
                const isCustomKey = effectiveKey !== apiKey;
                const modelName = isCustomKey ? "gemini-1.5-flash" : "gemini-2.5-flash-preview-09-2025";
                
                const DYNAMIC_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${effectiveKey}`;

                // Prepare file
                const { base64, mimeType } = await readFileAsBase64(selectedFile);

                // Prepare API payload
                const payload = {
                    contents: [{
                        parts: [
                            { text: "תמלל את קובץ השמע המצורף מילה במילה (Verbatim). חובה עליך לכתוב בדיוק את כל מה שנאמר, לא להשמיט אף מילה, לא לסכם ולא לערוך את התחביר. החזר אך ורק את הטקסט המתומלל ללא שום תוספות או הקדמות." },
                            { inlineData: { mimeType: mimeType, data: base64 } }
                        ]
                    }]
                };

                // Call API
                const data = await fetchWithRetry(DYNAMIC_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Extract text
                const transcribedText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (!transcribedText) {
                    throw new Error("המערכת לא הצליחה לזהות טקסט בקובץ זה.");
                }

                completeProgress();

                // Show result
                resultText.textContent = transcribedText;
                resultArea.classList.remove('hidden');
                setTimeout(() => {
                    resultArea.classList.add('opacity-100');
                    resultText.focus();
                }, 100);

            } catch (error) {
                stopProgress();
                showMessage(`אירעה שגיאה: ${error.message}`, 'error');
            } finally {
                // Reset loading state
                transcribeBtn.disabled = false;
                loadingSpinner.classList.add('hidden');
                transcribeBtn.querySelector('span').textContent = 'התחל תמלול עכשיו';
            }
        });

        // Copy to clipboard
        copyBtn.addEventListener('click', () => {
            const textToCopy = resultText.textContent;
            if (!textToCopy) return;

            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.opacity = '0';
            
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    const originalHTML = copyBtn.innerHTML;
                    copyBtn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i><span>הועתק בהצלחה!</span>`;
                    copyBtn.classList.replace('text-slate-600', 'text-green-600');
                    copyBtn.classList.replace('dark:text-slate-300', 'dark:text-green-400');
                    lucide.createIcons();
                    setTimeout(() => {
                        copyBtn.innerHTML = originalHTML;
                        copyBtn.classList.replace('text-green-600', 'text-slate-600');
                        copyBtn.classList.replace('dark:text-green-400', 'dark:text-slate-300');
                        lucide.createIcons();
                    }, 2500);
                } else {
                    showMessage("לא ניתן להעתיק את הטקסט אוטומטית.", 'error');
                }
            } catch (err) {
                showMessage("שגיאה בניסיון ההעתקה.", 'error');
            }

            document.body.removeChild(textarea);
        });
    </script>
</body>
</html>
