<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מחולל תשבצים מקצועי - מותאם אישית</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style id="dynamic-print-style">
    body, input, button, textarea {
      font-family: 'Varela Round', sans-serif;
    }

    /* הגדרות הדפסה בסיסיות */
    @media print {
      body {
        margin: 0 !important;
        padding: 0 !important;
        background: white !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        overflow: hidden !important; 
      }
      .print-hidden { display: none !important; }
      
      .printable-wrapper {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        margin: 0 !important;
        padding: 10mm !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        overflow: hidden !important; 
      }

      input::placeholder { color: transparent !important; }
      .clue-row { page-break-inside: avoid; break-inside: avoid; }
    }
    
    .print-hidden-scroll::-webkit-scrollbar { display: none; }
    .print-hidden-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* עיצוב עמודות להגדרות */
    .clues-multi-col {
      column-count: 2;
      column-gap: 20px;
    }
  </style>
</head>
<body class="bg-gray-100">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;

    function App() {
      const [rows, setRows] = useState(12);
      const [cols, setCols] = useState(12);
      const [grid, setGrid] = useState([]);
      const [mode, setMode] = useState('block'); 
      const [bgImage, setBgImage] = useState(null);
      const [orientation, setOrientation] = useState('landscape'); // 'landscape' or 'portrait'
      
      const [cluesAcross, setCluesAcross] = useState([]);
      const [cluesDown, setCluesDown] = useState([]);
      const [modalState, setModalState] = useState({ isOpen: false, r: null, c: null, value: '', isAcross: false, isDown: false });
      
      const [isDragging, setIsDragging] = useState(false);
      const [dragAction, setDragAction] = useState(null);
      const [title, setTitle] = useState('התשבץ שלי');
      const [subtitle, setSubtitle] = useState('הוראות: מלאו את המשבצות לפי ההגדרות למטה...');

      const [selectedFont, setSelectedFont] = useState("'Varela Round', sans-serif");
      const fontOptions = [
        { label: 'Varela Round', value: "'Varela Round', sans-serif" },
        { label: 'Arial', value: "Arial, sans-serif" },
        { label: 'David', value: "'David', serif" },
        { label: 'Tahoma', value: "Tahoma, sans-serif" }
      ];

      // עדכון הגדרת ה-CSS של @page לפי כיוון הדף
      useEffect(() => {
        const styleTag = document.getElementById('dynamic-print-style');
        const printRules = orientation === 'landscape' 
          ? `@media print { @page { size: A4 landscape; margin: 0mm; } .printable-wrapper { width: 297mm; height: 210mm; } }`
          : `@media print { @page { size: A4 portrait; margin: 0mm; } .printable-wrapper { width: 210mm; height: 297mm; } }`;
        
        // הוספת החוקים החדשים
        const existingRules = styleTag.innerHTML.split('/* Dynamic Rules Start */')[0];
        styleTag.innerHTML = existingRules + '/* Dynamic Rules Start */\n' + printRules;
      }, [orientation]);

      // חישוב גודל משבצת דינמי
      const cellSize = useMemo(() => {
        const spaceGridX = orientation === 'landscape' ? 600 : 700;
        const spaceGridY = orientation === 'landscape' ? 450 : 500;
        const calcWidth = spaceGridX / cols;
        const calcHeight = spaceGridY / rows;
        return Math.min(calcWidth, calcHeight, 40);
      }, [rows, cols, orientation]);

      useEffect(() => {
        const handleMouseUp = () => { setIsDragging(false); setDragAction(null); };
        window.addEventListener('mouseup', handleMouseUp);
        return () => window.removeEventListener('mouseup', handleMouseUp);
      }, []);

      useEffect(() => {
        setGrid((prevGrid) => {
          const newGrid = Array(rows).fill(null).map((_, r) =>
            Array(cols).fill(null).map((_, c) => {
              if (prevGrid[r] && prevGrid[r][c]) return { ...prevGrid[r][c] };
              return { isBlocked: false, number: null, value: '', isHighlighted: false };
            })
          );
          return newGrid;
        });
      }, [rows, cols]);

      const calculateNumbersAcross = useCallback(() => {
        const newGrid = grid.map(row => row.map(cell => ({ ...cell })));
        const newCluesAcross = [...cluesAcross];
        let maxNum = 0;
        newGrid.forEach(row => row.forEach(c => { if (c.number && c.number > maxNum) maxNum = c.number; }));

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            if (newGrid[r][c].isBlocked) continue;
            const isRightBlocked = c === 0 || newGrid[r][c - 1].isBlocked;
            const isLeftOpen = c < cols - 1 && !newGrid[r][c + 1].isBlocked;
            if (isRightBlocked && isLeftOpen) {
              let currentNumber = newGrid[r][c].number || ++maxNum;
              newGrid[r][c].number = currentNumber;
              if (!newCluesAcross.find(cl => cl.num === currentNumber)) newCluesAcross.push({ num: currentNumber, text: '' });
            }
          }
        }
        setCluesAcross(newCluesAcross.sort((a, b) => a.num - b.num));
        setGrid(newGrid);
      }, [grid, rows, cols, cluesAcross]);

      const applyDragAction = (r, c, action) => {
        setGrid(prevGrid => {
          const newGrid = prevGrid.map(row => [...row]);
          const cell = { ...newGrid[r][c] };
          if (action === 'block') {
            cell.isBlocked = true; cell.value = ''; cell.isHighlighted = false;
            if (cell.number) {
              setCluesAcross(prev => prev.filter(cl => cl.num !== cell.number));
              setCluesDown(prev => prev.filter(cl => cl.num !== cell.number));
            }
            cell.number = null;
          } else if (action === 'unblock') cell.isBlocked = false;
          else if (action === 'highlight') cell.isHighlighted = true;
          else if (action === 'unhighlight') cell.isHighlighted = false;
          newGrid[r][c] = cell;
          return newGrid;
        });
      };

      const handleMouseDown = (r, c) => {
        if (mode === 'number') {
          const cell = grid[r][c];
          if (!cell.isBlocked) {
            let val = cell.number || (Math.max(0, ...cluesAcross.map(c=>c.num), ...cluesDown.map(c=>c.num)) + 1);
            setModalState({ isOpen: true, r, c, value: val, isAcross: cluesAcross.some(cl => cl.num === val), isDown: cluesDown.some(cl => cl.num === val) || !cell.number });
          }
          return;
        }
        if (mode === 'text') return;
        setIsDragging(true);
        const action = mode === 'block' ? (grid[r][c].isBlocked ? 'unblock' : 'block') : (grid[r][c].isHighlighted ? 'unhighlight' : 'highlight');
        setDragAction(action);
        applyDragAction(r, c, action);
      };

      const handleSaveManualNumber = (e) => {
        e.preventDefault();
        const { r, c, value, isAcross, isDown } = modalState;
        const numVal = Number(value);
        const oldNum = grid[r][c].number;
        setGrid(prev => { const n = [...prev]; n[r][c] = {...n[r][c], number: numVal}; return n; });
        const update = (prev, keep) => {
          let next = prev.filter(cl => cl.num !== oldNum && cl.num !== numVal);
          if (keep) next.push({ num: numVal, text: prev.find(cl => cl.num === oldNum || cl.num === numVal)?.text || '' });
          return next.sort((a,b) => a.num - b.num);
        };
        setCluesAcross(prev => update(prev, isAcross));
        setCluesDown(prev => update(prev, isDown));
        setModalState({ isOpen: false, r: null, c: null, value: '', isAcross: false, isDown: false });
      };

      return (
        <div dir="rtl" className="min-h-screen text-gray-800 p-4">
          
          {/* לוח בקרה */}
          <div className="print-hidden mb-8 bg-white p-6 rounded-xl shadow-md border border-indigo-100 max-w-6xl mx-auto">
            <div className="flex flex-wrap gap-6 items-end justify-between">
              <div className="flex gap-4">
                <div><label className="block text-xs font-bold mb-1">שורות</label><input type="number" value={rows} onChange={e => setRows(Number(e.target.value))} className="w-14 p-1 border rounded" /></div>
                <div><label className="block text-xs font-bold mb-1">עמודות</label><input type="number" value={cols} onChange={e => setCols(Number(e.target.value))} className="w-14 p-1 border rounded" /></div>
              </div>
              
              <div className="flex bg-gray-100 rounded-lg p-1">
                {['block', 'text', 'highlight', 'number'].map(m => (
                  <button key={m} onClick={() => setMode(m)} className={`px-3 py-1.5 rounded-md text-sm font-bold ${mode === m ? 'bg-white shadow text-indigo-600' : 'hover:bg-gray-200'}`}>
                    {m === 'block' ? 'שחור' : m === 'text' ? 'טקסט' : m === 'highlight' ? 'הדגשה' : 'מספר'}
                  </button>
                ))}
              </div>

              <div className="flex bg-indigo-50 rounded-lg p-1">
                <button onClick={() => setOrientation('landscape')} className={`px-3 py-1.5 rounded-md text-sm font-bold ${orientation === 'landscape' ? 'bg-indigo-600 text-white' : 'text-indigo-600 hover:bg-indigo-100'}`}>A4 שוכב</button>
                <button onClick={() => setOrientation('portrait')} className={`px-3 py-1.5 rounded-md text-sm font-bold ${orientation === 'portrait' ? 'bg-indigo-600 text-white' : 'text-indigo-600 hover:bg-indigo-100'}`}>A4 עומד</button>
              </div>

              <div className="flex gap-2">
                <button onClick={calculateNumbersAcross} className="bg-green-100 text-green-700 px-3 py-2 rounded-lg text-sm font-bold hover:bg-green-200">מספור אוטומטי</button>
                <button onClick={() => window.print()} className="bg-indigo-600 text-white px-5 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700"><i className="fas fa-print ml-2"></i>הדפס</button>
              </div>
            </div>
          </div>

          {/* שטח ההדפסה */}
          <div className="flex justify-center w-full overflow-x-auto print:overflow-visible">
            <div 
              className="printable-wrapper relative bg-white shadow-2xl flex flex-col"
              style={{ 
                width: orientation === 'landscape' ? '1123px' : '794px', 
                aspectRatio: orientation === 'landscape' ? '297 / 210' : '210 / 297',
                padding: '40px'
              }}
            >
              {bgImage && <img src={bgImage} className="absolute inset-0 w-full h-full object-cover opacity-30 z-0" />}

              <div className="relative z-10 text-center mb-6">
                <input type="text" value={title} onChange={e => setTitle(e.target.value)} className="text-3xl font-bold bg-transparent text-center w-full outline-none" style={{ fontFamily: selectedFont }} />
                <input type="text" value={subtitle} onChange={e => setSubtitle(e.target.value)} className="text-lg text-gray-500 bg-transparent text-center w-full outline-none mt-1" style={{ fontFamily: selectedFont }} />
              </div>

              <div className={`relative z-10 flex ${orientation === 'landscape' ? 'flex-row gap-8' : 'flex-col gap-6'} flex-1 min-h-0 overflow-hidden`}>
                
                {/* רשת */}
                <div className="flex-shrink-0 flex justify-center items-start">
                  <div className="grid border-2 border-black bg-white" style={{ gridTemplateColumns: `repeat(${cols}, ${cellSize}px)` }}>
                    {grid.map((row, r) => row.map((cell, c) => (
                      <div 
                        key={`${r}-${c}`} 
                        onMouseDown={() => handleMouseDown(r, c)} onMouseEnter={() => isDragging && applyDragAction(r, c, dragAction)}
                        className={`relative border border-black flex items-center justify-center select-none ${cell.isBlocked ? 'bg-black' : 'bg-white'} ${cell.isHighlighted && !cell.isBlocked ? 'bg-indigo-50' : ''}`}
                        style={{ width: cellSize, height: cellSize }}
                      >
                        {!cell.isBlocked && cell.number && <span className="absolute top-0.5 right-0.5 text-[10px] font-bold leading-none">{cell.number}</span>}
                        {!cell.isBlocked && <input type="text" value={cell.value} onChange={e => { if(mode === 'text') { const n = [...grid]; n[r][c].value = e.target.value.slice(-1); setGrid(n); }}} readOnly={mode !== 'text'} className="w-full h-full text-center font-bold bg-transparent outline-none uppercase" style={{ fontSize: cellSize * 0.6, pointerEvents: mode === 'text' ? 'auto' : 'none' }} />}
                      </div>
                    )))}
                  </div>
                </div>

                {/* הגדרות */}
                <div className="flex-1 overflow-y-auto pr-2 print-hidden-scroll">
                  <div className={(cluesAcross.length + cluesDown.length) > 12 ? 'clues-multi-col' : ''}>
                    {cluesDown.length > 0 && (
                      <div className="mb-4">
                        <h3 className="font-bold border-b-2 border-black mb-2 text-lg">מאונך:</h3>
                        {cluesDown.map(c => (
                          <div key={c.num} className="flex gap-2 mb-1 text-sm clue-row">
                            <span className="font-bold min-w-[20px]">{c.num}.</span>
                            <input type="text" value={c.text} onChange={e => setCluesDown(prev => prev.map(cl => cl.num === c.num ? {...cl, text: e.target.value} : cl))} placeholder="הגדרה..." className="flex-1 border-b border-gray-100 outline-none print:border-none" />
                          </div>
                        ))}
                      </div>
                    )}
                    {cluesAcross.length > 0 && (
                      <div>
                        <h3 className="font-bold border-b-2 border-black mb-2 text-lg">מאוזן:</h3>
                        {cluesAcross.map(c => (
                          <div key={c.num} className="flex gap-2 mb-1 text-sm clue-row">
                            <span className="font-bold min-w-[20px]">{c.num}.</span>
                            <input type="text" value={c.text} onChange={e => setCluesAcross(prev => prev.map(cl => cl.num === c.num ? {...cl, text: e.target.value} : cl))} placeholder="הגדרה..." className="flex-1 border-b border-gray-100 outline-none print:border-none" />
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* מודאל מספר */}
          {modalState.isOpen && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 print-hidden">
              <form onSubmit={handleSaveManualNumber} className="bg-white p-6 rounded-xl w-80 shadow-2xl">
                <h3 className="text-lg font-bold mb-4">מספר תא: {modalState.value}</h3>
                <div className="space-y-3 mb-6">
                  <label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={modalState.isAcross} onChange={e => setModalState({...modalState, isAcross: e.target.checked})} className="w-5 h-5" /><span>שייך ל"מאוזן"</span></label>
                  <label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={modalState.isDown} onChange={e => setModalState({...modalState, isDown: e.target.checked})} className="w-5 h-5" /><span>שייך ל"מאונך"</span></label>
                </div>
                <div className="flex justify-end gap-2">
                  <button type="button" onClick={() => setModalState({isOpen:false})} className="px-4 py-2 text-gray-500">ביטול</button>
                  <button type="submit" className="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold">שמור</button>
                </div>
              </form>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
